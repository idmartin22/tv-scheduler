async function githubLoad() {
  try {
    const r = await fetch(GITHUB_API + `?t=${Date.now()}`, {
      headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!r.ok) return null;
    const meta = await r.json();
    // Decode base64 content — simple atob since content is plain JSON
    const json = atob(meta.content.split('\n').join(''));
    return JSON.parse(json);
  } catch(e) { return null; }
}

function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function strToDate(s) {
  const [y,m,d]=s.split('-').map(Number);
  return new Date(y,m-1,d);
}
function formatDateLabel(s) {
  const d=strToDate(s);
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}
function todayStr() { return dateToStr(new Date()); }

async function githubLoadSchedule(date) {
  try {
    const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/schedule/${date}.json?t=${Date.now()}`;
    const r = await fetch(url, { headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json' } });

    const json = atob(meta.content.split('\n').join(''));
    return JSON.parse(json);
  } catch(e) { console.error('githubLoadSchedule error:', e); return null; }
}

async function githubLoadOverrides(date) {
  try {
    const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/schedule/${date}-overrides.json?t=${Date.now()}`;
    const r = await fetch(url, { headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json' } });
    if (!r.ok) return { overrides: [], sha: null };
    const meta = await r.json();
    const json = atob(meta.content.split('\n').join(''));
    const parsed=JSON.parse(json);
    return { overrides: parsed.overrides||[], removed: parsed.removed||[], sha: meta.sha };
  } catch(e) { return { overrides: [], sha: null }; }
}

async function githubSaveOverrides(date, ovrs, removed, sha) {
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify({ date, overrides: ovrs, removed: removed||[] }, null, 2))));
    const body = { message: `Update overrides for ${date}`, content };
    if (sha) body.sha = sha;
    const r = await fetch(
      `https://api.github.com/repos/${GITHUB_REPO}/contents/schedule/${date}-overrides.json`,
      { method: 'PUT', headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    if (!r.ok) return null;
    const j = await r.json();
    return j.content?.sha || null;
  } catch(e) { return null; }
}

async function githubSave(data, sha) {
  // Safe base64 encoding that handles unicode
  const json = JSON.stringify(data, null, 2);
  const bytes = new TextEncoder().encode(json);
  const binStr = Array.from(bytes).map(b => String.fromCharCode(b)).join('');
  const b64 = btoa(binStr);

  // If no SHA provided, fetch current one first
  if (!sha) {
    try {
      const r = await fetch(GITHUB_API, { headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json' } });
      if (r.ok) { const j = await r.json(); sha = j.sha; }
    } catch(e) {}
  }

  const body = { message: `Update settings ${new Date().toISOString()}`, content: b64 };
  if (sha) body.sha = sha;

  const r = await fetch(GITHUB_API, {
    method: 'PUT',
    headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  // On 409 conflict, refresh SHA and retry once
  if (r.status === 409 || r.status === 422) {
    const r2 = await fetch(GITHUB_API, { headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json' } });
    if (r2.ok) {
      const j2 = await r2.json();
      body.sha = j2.sha;
      const r3 = await fetch(GITHUB_API, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r3.ok) throw new Error(`GitHub save failed: ${r3.status}`);
      const j3 = await r3.json();
      return j3.content.sha;
    }
  }

  if (!r.ok) throw new Error(`GitHub save failed: ${r.status}`);
  const j = await r.json();
  return j.content.sha;
}

// Spectrum Cleveland/Elyria channel lineup
// SPECTRUM map and channel priority loaded dynamically from channels.txt
let SPECTRUM = {};
let CHANNEL_PRIORITY = [];

async function loadChannels() {
  try {
    const r = await fetch("channels.txt?_=" + Date.now());
    const text = await r.text();
    const lines = text.split("\n");
    const priority = [];
    const spectrum = {};
    for (let line of lines) {
      line = line.trim();
      if (!line || line.startsWith("#")) continue;
      const m = line.match(/^(.+?)\s*\((\d+)\)\s*$/);
      if (m) {
        const name = m[1].trim();
        const num  = parseInt(m[2]);
        priority.push(name);
        spectrum[name] = num;
      } else {
        priority.push(line);
      }
    }
    SPECTRUM = spectrum;
    CHANNEL_PRIORITY = priority;
  } catch(e) {
    console.warn("channels.txt not found, using empty spectrum map", e);
  }
}

function getSpectrumCh(ch) {
  if (!ch) return null;
  const key = ch.trim();
  if (SPECTRUM[key] !== undefined) return SPECTRUM[key];
  const kl = key.toLowerCase();
  for (const [k, v] of Object.entries(SPECTRUM)) {
    if (k.toLowerCase() === kl) return v;
  }
  return null;
}

function normalize(evs) {
  const sc2=evs.map(e=>e.priority||0);
  const mn=Math.min(...sc2),mx=Math.max(...sc2);
  if(mx===mn) return evs.map(e=>({...e,ds:mn>0?100:0}));
  return evs.map(e=>({...e,ds:Math.round(((e.priority-mn)/(mx-mn))*100)}));
}

  const evts=assigned.filter(a=>a&&a.tv===tvId).sort((a,b)=>a.startMin-b.startMin);
  const out=[];let ptr=BAR_OPEN;
  const cps=[...evts.map(e=>({s:e.startMin,e:e.endMin})),{s:BAR_CLOSE,e:BAR_CLOSE}];
  for(const cp of cps){
    if(cp.s-ptr>=DEAD_MIN){
      const ach=new Set(assigned.filter(a=>a&&a.startMin<cp.s&&a.endMin>ptr).map(a=>(a.channel||"").toLowerCase().replace(/\s+/g,"")));
      const f=getFill(tvId,ach,tvFillChMap);
      out.push({isFill:true,tv:tvId,startMin:ptr,endMin:cp.s,dur:cp.s-ptr,name:f.name,fc:f.c});
    }
    ptr=cp.e;
  }
  return out;
}

function runSchedule(events,activeTVs){
  const active=TV_PRIO.filter(id=>activeTVs.has(id));
  const sorted=[...events].sort((a,b)=>b.priority-a.priority||a.startMin-b.startMin);
  const asgn=[];
  for(const e of sorted){
    const avail=[];
    for(const tv of active){
      const cur=asgn.filter(a=>a.tv===tv);
      if(cur.find(a=>overlaps(a,e)))continue;
      const last=cur.reduce((mx,a)=>a.endMin<=e.startMin?Math.max(mx,a.endMin):mx,BAR_OPEN);
      avail.push({tv,gap:e.startMin-last,ord:TVS[tv].ord});
    }
    if(avail.length){
      avail.sort((a,b)=>a.ord!==b.ord?a.ord-b.ord:a.gap-b.gap);
      asgn.push({...e,tv:avail[0].tv,why:null});
    }else{
      const blk=active.map(tv=>({tv,b:asgn.filter(a=>a.tv===tv).find(a=>overlaps(a,e))})).filter(x=>x.b);
      blk.sort((a,b)=>a.b.priority-b.b.priority);
      const lb=blk[0];
      asgn.push({...e,tv:-1,why:`All ${active.length} TVs occupied. Lowest: "${lb.b.name}" on ${TVS[lb.tv]?.name}`,bumpTgt:{name:lb.b.name,tv:lb.tv}});
    }
  }
  return asgn;
}

    // (means GitHub load failed and we have stale defaults in state)
    if(lastKnownGood.current&&payload.leagueMods){

      if(!placed)w=w.map(a=>a.id===id?{...a,tv:-1,why:"No TV available after mirror displacement"}:a);

  const GRID_END=latestEvt;

                    <button onClick={()=>setOvrForm({eventId:selEv.id,tvId:o.tvId,fromMin:o.startMin,toMin:o.endMin})}
                      style={{background:"none",border:"none",color:"#f59e0b",cursor:"pointer",fontSize:10,padding:0,lineHeight:1}}
                      title="Edit override">✏️</button>
                    <button onClick={()=>removeOverride(selEv.id,o.tvId)}
                      style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:11,padding:0,lineHeight:1}}
                      title="Remove override">✕</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

    loadChannels().then(() => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App/>);
    });
  </script>
</body>
</html>
