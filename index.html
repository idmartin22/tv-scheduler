async function githubLoad() {
  try {
    const r = await fetch(GITHUB_API + `?t=${Date.now()}`, {
      headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!r.ok) return null;
    const meta = await r.json();
    // Decode base64 content — simple atob since content is plain JSON
    const json = atob(meta.content.split('\n').join(''));
    return JSON.parse(json);
  } catch(e) { return null; }
}

function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function strToDate(s) {
  const [y,m,d]=s.split('-').map(Number);
  return new Date(y,m-1,d);
}
function formatDateLabel(s) {
  const d=strToDate(s);
  const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}
function todayStr() { return dateToStr(new Date()); }

async function githubLoadSchedule(date) {
  // date format: YYYY-MM-DD
  try {
    const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/schedule/${date}.json?t=${Date.now()}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function githubSave(data, sha) {
  // Safe base64 encoding that handles unicode
  const json = JSON.stringify(data, null, 2);
  const bytes = new TextEncoder().encode(json);
  const binStr = Array.from(bytes).map(b => String.fromCharCode(b)).join('');
  const b64 = btoa(binStr);

  // If no SHA provided, fetch current one first
  if (!sha) {
    try {
      const r = await fetch(GITHUB_API, { headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json' } });
      if (r.ok) { const j = await r.json(); sha = j.sha; }
    } catch(e) {}
  }

  const body = { message: `Update settings ${new Date().toISOString()}`, content: b64 };
  if (sha) body.sha = sha;

  const r = await fetch(GITHUB_API, {
    method: 'PUT',
    headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  // On 409 conflict, refresh SHA and retry once
  if (r.status === 409 || r.status === 422) {
    const r2 = await fetch(GITHUB_API, { headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json' } });
    if (r2.ok) {
      const j2 = await r2.json();
      body.sha = j2.sha;
      const r3 = await fetch(GITHUB_API, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${GITHUB_PAT}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r3.ok) throw new Error(`GitHub save failed: ${r3.status}`);
      const j3 = await r3.json();
      return j3.content.sha;
    }
  }

  if (!r.ok) throw new Error(`GitHub save failed: ${r.status}`);
  const j = await r.json();
  return j.content.sha;
}

function normalize(evs) {
  const sc2=evs.map(e=>e.priority||0);
  const mn=Math.min(...sc2),mx=Math.max(...sc2);
  if(mx===mn) return evs.map(e=>({...e,ds:mn>0?100:0}));
  return evs.map(e=>({...e,ds:Math.round(((e.priority-mn)/(mx-mn))*100)}));
}

function getFill(tvId,ach){
  const i=TV_PRIO.indexOf(tvId);
  for(let x=0;x<FILLS.length;x++){const f=FILLS[(i+x)%FILLS.length];if(!ach.has(f.name.toLowerCase().replace(/\s+/g,"")))return f;}
  return FILLS[i%FILLS.length];
}
function fillBlocks(tvId,assigned){
  const evts=assigned.filter(a=>a&&a.tv===tvId).sort((a,b)=>a.startMin-b.startMin);
  const out=[];let ptr=BAR_OPEN;
  const cps=[...evts.map(e=>({s:e.startMin,e:e.endMin})),{s:BAR_CLOSE,e:BAR_CLOSE}];
  for(const cp of cps){
    if(cp.s-ptr>=DEAD_MIN){
      const ach=new Set(assigned.filter(a=>a&&a.startMin<cp.s&&a.endMin>ptr).map(a=>(a.channel||"").toLowerCase().replace(/\s+/g,"")));
      const f=getFill(tvId,ach);
      out.push({isFill:true,tv:tvId,startMin:ptr,endMin:cp.s,dur:cp.s-ptr,name:f.name,fc:f.c});
    }
    ptr=cp.e;
  }
  return out;
}

function runSchedule(events,activeTVs){
  const active=TV_PRIO.filter(id=>activeTVs.has(id));
  const sorted=[...events].sort((a,b)=>b.priority-a.priority||a.startMin-b.startMin);
  const asgn=[];
  for(const e of sorted){
    const avail=[];
    for(const tv of active){
      const cur=asgn.filter(a=>a.tv===tv);
      if(cur.find(a=>overlaps(a,e)))continue;
      const last=cur.reduce((mx,a)=>a.endMin<=e.startMin?Math.max(mx,a.endMin):mx,BAR_OPEN);
      avail.push({tv,gap:e.startMin-last,ord:TVS[tv].ord});
    }
    if(avail.length){
      avail.sort((a,b)=>a.ord!==b.ord?a.ord-b.ord:a.gap-b.gap);
      asgn.push({...e,tv:avail[0].tv,why:null});
    }else{
      const blk=active.map(tv=>({tv,b:asgn.filter(a=>a.tv===tv).find(a=>overlaps(a,e))})).filter(x=>x.b);
      blk.sort((a,b)=>a.b.priority-b.b.priority);
      const lb=blk[0];
      asgn.push({...e,tv:-1,why:`All ${active.length} TVs occupied. Lowest: "${lb.b.name}" on ${TVS[lb.tv]?.name}`,bumpTgt:{name:lb.b.name,tv:lb.tv}});
    }
  }
  return asgn;
}

  {sport:"Tennis",c:"#92400e",tc:"#fef08a",ls:[{id:"wimbledon",n:"Wimbledon"},{id:"us-open-tennis",n:"US Open Tennis"},{id:"french-open",n:"French Open"},{id:"aus-open",n:"Australian Open"},{id:"atp",n:"ATP Tour"},{id:"wta",n:"WTA Tour"}]},
  {sport:"Fighting",c:"#7f1d1d",tc:"#fca5a5",ls:[{id:"ufc",n:"UFC"},{id:"boxing",n:"Boxing"},{id:"kickboxing",n:"Kickboxing"},{id:"mma",n:"MMA"}]},

];
const ALL_LEAGUES=LG.flatMap(g=>g.ls.map(l=>({...l,sport:g.sport,gc:g.c,gtc:g.tc})));

function parseScheduleEvents(rawEvents) {
  return rawEvents.map(o=>makeEvent(o));
}
const DEF_ORDER=ALL_LEAGUES.map(l=>l.id);
const DEF_MODS=(()=>{
  const total=ALL_LEAGUES.length;
  const obj={};
  ALL_LEAGUES.forEach((l,i)=>{
    obj[l.id]=total<=1?50:Math.round((1-i/Math.max(total-1,1))*50);
  });
  return obj;
})();

function ScheduleUploader({date, onPushed, ghPat, ghRepo}) {
  const [images, setImages] = useState([]);
  const [parsing, setParsing] = useState(false);
  const [parsedEvents, setParsedEvents] = useState(null);
  const [pushing, setPushing] = useState(false);
  const [pushStatus, setPushStatus] = useState(null);
  const fileRef = React.useRef(null);

  const handleFiles = (files) => {
    const imgs = Array.from(files).filter(f => f.type.startsWith('image/'));
    Promise.all(imgs.map(f => new Promise((res) => {
      const r = new FileReader();
      r.onload = e => res({name: f.name, data: e.target.result, type: f.type});
      r.readAsDataURL(f);
    }))).then(results => setImages(prev => [...prev, ...results]));
  };

  const handleDrop = (e) => {
    e.preventDefault();
    handleFiles(e.dataTransfer.files);
  };

  const parseSchedule = async () => {
    if (!images.length) return;
    setParsing(true);
    setParsedEvents(null);
    try {
      const imageContent = images.map(img => ({
        type: "image",
        source: { type: "base64", media_type: img.type, data: img.data.split(',')[1] }
      }));
      const prompt = `These are screenshots from livesportsontv.com showing sports events for ${date}. All times shown are Eastern Time (ET).

Extract ALL sports events visible and return ONLY a JSON array with this exact structure, no other text:
[{"id":1,"time":"HH:MM","name":"Team A vs Team B","sport":"Soccer","league":"World Cup 2026","ch":"FOX","dur":120,"_st":{"v":0,"l":""},"_sk":{"v":0,"l":""},"_rv":{"v":0,"l":""},"_mq":{"v":0,"l":""}}]

Rules:
- time: 24hr format converted from ET (e.g. 1:00 PM = "13:00")
- sport: Soccer, Baseball, Basketball, Football, Golf, Hockey, Tennis, Motorsports, Softball, Rugby, Fighting
- league: exact league name as shown (e.g. "World Cup 2026", "MLB", "NBA", "NFL")
- ch: primary broadcast channel shown
- dur: estimated duration in minutes (soccer=120, baseball=180, basketball=150, football=210, golf=240)
- _st, _sk, _rv, _mq: leave all as {"v":0,"l":""} — scoring will be set manually
- id: sequential starting from 1
- Skip events before 7:00 AM ET
- For World Cup games, set _mq to {"v":15,"l":"World Cup group stage +15"}`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 4000,
          messages: [{
            role: "user",
            content: [...imageContent, {type: "text", text: prompt}]
          }]
        })
      });
      const data = await response.json();
      const text = data.content?.find(b => b.type === "text")?.text || "";
      const jsonMatch = text.match(/\[[\s\S]*\]/);
      if (jsonMatch) {
        const events = JSON.parse(jsonMatch[0]);
        setParsedEvents(events);
      } else {
        alert("Could not parse events from images. Try again.");
      }
    } catch(e) {
      alert("Parse error: " + e.message);
    }
    setParsing(false);
  };

  const pushToGithub = async () => {
    if (!parsedEvents) return;
    setPushing(true);
    setPushStatus(null);
    try {
      const schedule = {date, label: date, events: parsedEvents};
      const json = JSON.stringify(schedule, null, 2);
      const b64 = btoa(json.split('').map(c => {
        const code = c.charCodeAt(0);
        return code > 127 ? encodeURIComponent(c).replace(/%/g,'') : c;
      }).join(''));
      const api = `https://api.github.com/repos/${ghRepo}/contents/schedule/${date}.json`;
      // Check if file exists for SHA
      let sha = null;
      try {
        const check = await fetch(api, {headers:{'Authorization':`Bearer ${ghPat}`,'Accept':'application/vnd.github+json'}});
        if (check.ok) { const j = await check.json(); sha = j.sha; }
      } catch(e) {}
      const body = {message: `Add schedule ${date}`, content: btoa(unescape(encodeURIComponent(json)))};
      if (sha) body.sha = sha;
      const r = await fetch(api, {
        method: "PUT",
        headers: {'Authorization':`Bearer ${ghPat}`,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if (r.ok) {
        setPushStatus("success");
        onPushed();
      } else {
        setPushStatus("error");
      }
    } catch(e) {
      setPushStatus("error");
    }
    setPushing(false);
  };

  const removeEvent = (i) => setParsedEvents(prev => prev.filter((_,idx) => idx !== i));
  const clearImages = () => { setImages([]); setParsedEvents(null); setPushStatus(null); };

  return (
    <div>
      {/* Image upload area */}
      <div
        onDrop={handleDrop}
        onDragOver={e=>e.preventDefault()}
        onClick={()=>fileRef.current?.click()}
        style={{margin:"12px 14px",border:`2px dashed ${images.length?"#4ade80":"#2d3a50"}`,borderRadius:8,padding:"20px",textAlign:"center",cursor:"pointer",background:images.length?"#0f2d1a":"#111827"}}
      >
        <input ref={fileRef} type="file" accept="image/*" multiple onChange={e=>handleFiles(e.target.files)} style={{display:"none"}}/>
        {images.length === 0 ? (
          <div>
            <div style={{fontSize:24,marginBottom:6}}>📸</div>
            <div style={{fontFamily:"monospace",fontSize:10,color:"#94a3b8"}}>Tap or drag to upload livesportsontv screenshots</div>
            <div style={{fontFamily:"monospace",fontSize:8,color:"#4a5a72",marginTop:4}}>Multiple images supported</div>
          </div>
        ) : (
          <div>
            <div style={{fontFamily:"monospace",fontSize:10,color:"#4ade80",marginBottom:6}}>✓ {images.length} image{images.length>1?"s":""} loaded</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
              {images.map((img,i)=>(
                <div key={i} style={{position:"relative"}}>
                  <img src={img.data} style={{width:60,height:80,objectFit:"cover",borderRadius:4,border:"1px solid #2d3a50"}}/>
                  <button onClick={e=>{e.stopPropagation();setImages(prev=>prev.filter((_,idx)=>idx!==i));}} style={{position:"absolute",top:-4,right:-4,background:"#f87171",border:"none",borderRadius:"50%",width:14,height:14,fontSize:8,cursor:"pointer",color:"#fff",lineHeight:1}}>×</button>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Action buttons */}
      <div style={{display:"flex",gap:8,padding:"0 14px 12px",flexWrap:"wrap"}}>
        {images.length > 0 && !parsedEvents && (
          <button onClick={parseSchedule} disabled={parsing} style={{background:parsing?"#1e3a8a":"#1d4ed8",border:"none",borderRadius:6,color:"#fff",fontFamily:"monospace",fontSize:10,fontWeight:700,padding:"8px 16px",cursor:parsing?"default":"pointer"}}>
            {parsing ? "⟳ PARSING..." : "🤖 PARSE SCHEDULE"}
          </button>
        )}
        {images.length > 0 && (
          <button onClick={clearImages} style={{background:"none",border:`1px solid ${C.BD2}`,borderRadius:6,color:C.MT,fontFamily:"monospace",fontSize:10,padding:"8px 12px",cursor:"pointer"}}>CLEAR</button>
        )}
        {parsedEvents && (
          <button onClick={pushToGithub} disabled={pushing} style={{background:pushing?"#14532d":"#15803d",border:"none",borderRadius:6,color:"#fff",fontFamily:"monospace",fontSize:10,fontWeight:700,padding:"8px 16px",cursor:pushing?"default":"pointer"}}>
            {pushing ? "⟳ PUSHING..." : `✓ PUSH ${parsedEvents.length} EVENTS TO GITHUB`}
          </button>
        )}
        {pushStatus==="success" && <div style={{fontFamily:"monospace",fontSize:10,color:"#4ade80",padding:"8px 0"}}>✓ Schedule pushed! Loading now...</div>}
        {pushStatus==="error" && <div style={{fontFamily:"monospace",fontSize:10,color:"#f87171",padding:"8px 0"}}>✗ Push failed. Try again.</div>}
      </div>

      {/* Parsed events review */}
      {parsedEvents && (
        <div style={{padding:"0 14px"}}>
          <div style={{fontFamily:"monospace",fontSize:9,color:C.MT,marginBottom:6}}>REVIEW {parsedEvents.length} PARSED EVENTS — tap × to remove</div>
          {parsedEvents.map((e,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",marginBottom:4,background:"#1c2030",borderRadius:6,border:`1px solid ${C.BD}`}}>
              <div style={{fontFamily:"monospace",fontSize:9,color:"#fbbf24",minWidth:42}}>{e.time}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#f1f5f9",fontWeight:500}}>{e.name}</div>
                <div style={{fontFamily:"monospace",fontSize:8,color:C.MT}}>{e.league} · {e.ch} · {e.dur}min</div>
              </div>
              <button onClick={()=>removeEvent(i)} style={{background:"none",border:"none",color:"#f87171",fontSize:14,cursor:"pointer",lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App(){
  const [activeTVs,setActiveTVs]=useState(()=>new Set(TV_PRIO));
  const [syncStatus,setSyncStatus]=useState("idle"); // idle | loading | saving | saved | error
  const [ghaSha,setGhaSha]=useState(null);
  const saveTimerRef=React.useRef(null);
  const settingsLoaded=React.useRef(false);
  const toggleTV=id=>setActiveTVs(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});

  const loadScheduleForDate=React.useCallback(async(dateStr)=>{
    setScheduleStatus("loading");
    setDynamicEvents(null);
    try{
      const sched=await githubLoadSchedule(dateStr);
      if(sched?.events){setDynamicEvents(sched.events);setScheduleStatus("loaded");}
      else setScheduleStatus("none");
    }catch(e){setScheduleStatus("error");}
  },[]);

  const navigateDate=React.useCallback((delta)=>{
    setScheduleDate(prev=>{
      const d=strToDate(prev);
      d.setDate(d.getDate()+delta);
      const today=new Date(); today.setHours(0,0,0,0);
      const maxFuture=new Date(today); maxFuture.setDate(today.getDate()+6);
      if(d<today){d.setTime(today.getTime());}
      if(d>maxFuture){d.setTime(maxFuture.getTime());}
      const newStr=dateToStr(d);
      loadScheduleForDate(newStr);
      return newStr;
    });
  },[loadScheduleForDate]);

  const goToToday=React.useCallback(()=>{
    const t=todayStr();
    setScheduleDate(t);
    loadScheduleForDate(t);
  },[loadScheduleForDate]);

  const updateTvName=(id,val)=>{
    const n={...tvNames,[id]:val||`TV ${id+1}`};
    setTvNames(n);
    debouncedSave(buildSavePayload({tvNames:n}));
  };
  // Mirror presets: source TV index -> array of mirror TV indices (0-based)
  const MIRROR_PRESETS={"Mirror 1":[[0,[6,9]],[1,[8]],[2,[4]]]};
  const [activePreset,setActivePreset]=useState(null);
  const [presetPairs,setPresetPairs]=useState([]); // [[srcTv,[mirrorTvs]],...]
  const applyPreset=(name)=>{
    if(activePreset===name){setActivePreset(null);setPresetPairs([]);return;}
    setActivePreset(name);
    setPresetPairs(MIRROR_PRESETS[name]);
  };
  const [mirrors,setMirrors]=useState({});
  const [sel,setSel]=useState(null);
  const [tab,setTab]=useState("grid");
  const [prioOvr,setPrioOvr]=useState({});
  const [order,setOrder]=useState([...DEF_ORDER]);
  const [unknownLeagues,setUnknownLeagues]=useState({}); // leagueId -> {n, sport, gc, gtc}
  const [scheduleDate,setScheduleDate]=useState(()=>{
    const now=new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  });
  const [dynamicEvents,setDynamicEvents]=useState(null); // null = use hardcoded EVENTS
  const [tvNames,setTvNames]=useState(()=>Object.fromEntries(TV_PRIO.map(id=>([id,`TV ${id+1}`]))));
  const [scheduleStatus,setScheduleStatus]=useState("none"); // none | loading | loaded | error
  const [ready,setReady]=useState(false);
  const [favTeams,setFavTeams]=useState({...DEF_FAVES});
  const [leagueMods,setLeagueMods]=useState({...DEF_MODS});

  useEffect(()=>{
    let active=true;
    (async()=>{
      setSyncStatus("loading");
      try{
        // Load settings
        const data=await githubLoad();
        if(data&&active){
          if(data.favTeams&&typeof data.favTeams==="object") setFavTeams(prev=>({...DEF_FAVES,...data.favTeams}));
          if(data.leagueMods&&typeof data.leagueMods==="object") setLeagueMods(prev=>({...DEF_MODS,...data.leagueMods}));
          // Auto-clear prioOvr and mirrors if it's a new day
          const today=new Date();
          const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
          const isNewDay=data.lastDate&&data.lastDate!==todayStr;
          if(!isNewDay&&data.prioOvr&&typeof data.prioOvr==="object") setPrioOvr(Object.fromEntries(Object.entries(data.prioOvr).map(([k,v])=>[Number(k),v])));
          if(!isNewDay&&data.mirrors&&typeof data.mirrors==="object") setMirrors(data.mirrors);
          if(data.unknownLeagues&&typeof data.unknownLeagues==="object") setUnknownLeagues(data.unknownLeagues);
          if(data.tvNames&&typeof data.tvNames==="object") setTvNames(prev=>({...prev,...data.tvNames}));
        }
        // fetch SHA for saving
        try{
          const r=await fetch(GITHUB_API,{headers:{'Authorization':`Bearer ${GITHUB_PAT}`,'Accept':'application/vnd.github+json'}});
          if(r.ok){const j=await r.json();if(active)setGhaSha(j.sha);}
        }catch(e){}
        // Load today's schedule
        const today=new Date();
        const dateStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        if(active)setScheduleDate(dateStr);
        const sched=await githubLoadSchedule(dateStr);
        if(sched?.events&&active){
          setDynamicEvents(sched.events);
        }
        settingsLoaded.current=true;
        if(active)setSyncStatus("saved");
      }catch(e){
        settingsLoaded.current=true; // allow saves even if load failed
        if(active)setSyncStatus("error");
      }
      if(active)setReady(true);
    })();
    return()=>{active=false;};
  },[]);

  // Compute active events — use GitHub schedule if loaded, else hardcoded EVENTS
  const activeEvents=useMemo(()=>{
    const evs=dynamicEvents?parseScheduleEvents(dynamicEvents):EVENTS;
    return evs;
  },[dynamicEvents]);

  // Auto-register unknown leagues found in today's events
  useEffect(()=>{
    const found={};
    activeEvents.forEach(e=>{
      if(e.isUnknown&&!ALL_LEAGUES.find(l=>l.id===e.leagueId)){
        found[e.leagueId]={n:e.league,sport:e.sport||"Other",gc:"#374151",gtc:"#9ca3af",isUnknown:true};
      }
    });
    if(Object.keys(found).length>0){
      setUnknownLeagues(prev=>{
        const merged={...prev,...found};
        // Only save if there are new ones
        const hasNew=Object.keys(found).some(k=>!prev[k]);
        if(hasNew) debouncedSave(buildSavePayload({unknownLeagues:merged}));
        return merged;
      });
    }
  },[activeEvents]);

  const debouncedSave=React.useCallback((payload)=>{
    if(!settingsLoaded.current){console.warn("Save blocked — settings not yet loaded from GitHub");return;}
    if(saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSyncStatus("saving");
    saveTimerRef.current=setTimeout(async()=>{
      try{
        const newSha=await githubSave(payload,ghaSha);
        setGhaSha(newSha);
        setSyncStatus("saved");
      }catch(e){
        setSyncStatus("error");
      }
    },500);
  },[ghaSha]);

  const buildSavePayload=React.useCallback((overrides={})=>{
    return {
      leagueMods: overrides.leagueMods ?? leagueMods,
      favTeams:   overrides.favTeams   ?? favTeams,
      prioOvr:    overrides.prioOvr    ?? prioOvr,
      mirrors:    overrides.mirrors    ?? mirrors,
      unknownLeagues: overrides.unknownLeagues ?? unknownLeagues,
      tvNames:    overrides.tvNames    ?? tvNames,
      lastDate:   overrides.lastDate   ?? scheduleDate ?? new Date().toISOString().slice(0,10),
    };
  },[leagueMods,favTeams,prioOvr,mirrors,unknownLeagues,tvNames,scheduleDate]);

  const updateFave=(leagueId,val)=>{const f={...favTeams,[leagueId]:val};setFavTeams(f);debouncedSave(buildSavePayload({favTeams:f}));};

  const updateMod=(leagueId,val)=>{const v=Math.min(MAX_MOD,Math.max(0,Number(val)||0));const m={...leagueMods,[leagueId]:v};setLeagueMods(m);debouncedSave(buildSavePayload({leagueMods:m}));};

  const ewp=useMemo(()=>{
    const base=activeEvents.map(e=>{
      const lm=leagueMods[e.leagueId]??0;
      const fb=getFaveBoost(e.name,e.leagueId,favTeams);
      const fm=fb.match?FAVE_BOOST:0;
      const raw=e.rawBase+lm+fm;
      const ov=prioOvr[e.id]??prioOvr[String(e.id)];
      const bd=[
        ...e.breakdown.filter(b=>b&&!b.l?.includes("League mod")&&!b.l?.includes("Fave")),
        lm>0&&{l:`League mod +${lm}`,v:lm},
        fm>0&&{l:`⭐ Fave team match +${fm}`,v:fm},
      ].filter(Boolean);
      return {...e,priority:ov??raw,lm,isFave:fb.match,faveMatched:fb.teams,breakdown:bd};
    });
    return normalize(base);
  },[leagueMods,prioOvr,favTeams]);

  // Current time in minutes for "What's on Now"
  const [nowMin,setNowMin]=useState(()=>{const n=new Date();return n.getHours()*60+n.getMinutes();});
  useEffect(()=>{
    const t=setInterval(()=>{const n=new Date();setNowMin(n.getHours()*60+n.getMinutes());},60000);
    return()=>clearInterval(t);
  },[]);
  const isToday=scheduleDate===todayStr();

  const schedulableTVs=useMemo(()=>{
    const mirrorTargets=new Set(presetPairs.flatMap(([,ts])=>ts));
    const s=new Set([...activeTVs].filter(id=>!mirrorTargets.has(id)));
    return s;
  },[activeTVs,presetPairs]);
  const asgn0=useMemo(()=>runSchedule(ewp,schedulableTVs),[ewp,schedulableTVs]);

  const {final,mblocks}=useMemo(()=>{
    const active=TV_PRIO.filter(id=>activeTVs.has(id));
    const mirrorTargets=new Set(presetPairs.flatMap(([,ts])=>ts));
    let w=[...asgn0];
    const claims=[];
    // Per-event manual mirrors
    for(const [ids,tvSet] of Object.entries(mirrors)){
      const id=parseInt(ids);const src=w.find(a=>a.id===id);
      if(!src||src.tv===-1)continue;
      for(const tv of tvSet){if(!active.includes(tv)||tv===src.tv)continue;claims.push({tv,srcId:id,startMin:src.startMin,endMin:src.endMin,evt:src});}
    }
    // Preset mirror pairs: mirror all events on source TV to target TVs
    for(const [srcTv,mirrorTvs] of presetPairs){
      const srcEvents=w.filter(a=>a.tv===srcTv);
      for(const src of srcEvents){
        for(const tv of mirrorTvs){
          if(!active.includes(tv))continue;
          claims.push({tv,srcId:src.id,startMin:src.startMin,endMin:src.endMin,evt:src});
        }
      }
    }
    const disp=new Set();
    for(const c of claims)w.forEach(a=>{if(a.tv===c.tv&&a.id!==c.srcId&&overlaps(a,c))disp.add(a.id);});
    w=w.map(a=>disp.has(a.id)?{...a,tv:-1,why:"Displaced by mirror"}:a);
    for(const id of disp){
      const e=w.find(a=>a.id===id);if(!e)continue;
      const mtv=new Set(claims.filter(c=>overlaps(c,e)).map(c=>c.tv));
      let placed=false;
      for(const tv of active){if(mtv.has(tv))continue;if(!w.find(a=>a.tv===tv&&a.id!==id&&overlaps(a,e))){w=w.map(a=>a.id===id?{...a,tv,why:null}:a);placed=true;break;}}
      if(!placed)w=w.map(a=>a.id===id?{...a,tv:-1,why:"No TV available after mirror displacement"}:a);
    }
    const mb=claims.map(c=>c.evt?{...c.evt,tv:c.tv,isMB:true,srcId:c.srcId}:null).filter(Boolean);
    return{final:w.filter(Boolean),mblocks:mb};
  },[asgn0,mirrors,activeTVs,presetPairs]);

  const asgnd=useMemo(()=>final.filter(a=>a.tv!==-1),[final]);
  const unasgd=useMemo(()=>final.filter(a=>a.tv===-1),[final]);

  const toggleMirror=(evId,tv)=>setMirrors(p=>{const c=new Set(p[evId]||[]);c.has(tv)?c.delete(tv):c.add(tv);const n={...p,[evId]:[...c]};debouncedSave({leagueMods,favTeams,prioOvr,mirrors:n,unknownLeagues});return n;});
  const bumpAndAssign=e=>{
    if(!e.bumpTgt)return;
    const b=final.find(a=>a.name===e.bumpTgt.name&&a.tv===e.bumpTgt.tv);
    if(!b)return;
    setPrioOvr(p=>{const n={...p,[e.id]:e.priority+1,[b.id]:-1};debouncedSave({leagueMods,favTeams,prioOvr:n,mirrors,unknownLeagues});return n;});setSel(null);
  };
  const selEv=sel?final.find(a=>a&&a.id===sel):null;

  const TMINS=BAR_CLOSE-BAR_OPEN;
  const pct=m=>((m-BAR_OPEN)/TMINS*100).toFixed(2)+"%";

                  {te.map((a,i)=>{if(!a)return null;const c=sc(a);const isSel=sel===a.id;const isNow=isToday&&nowMin>=a.startMin&&nowMin<a.endMin;return(<div key={i} style={{...blkStyle(c,isSel,isNow),left:pct(a.startMin),width:wpct(a.dur),zIndex:3}} className={isNow?"now-playing":""} onClick={()=>setSel(isSel?null:a.id)}><div style={{fontSize:9,fontWeight:600,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.isFave?"⭐":""}{stars(a.ds??0)}{a.name}</div><div style={{fontSize:8,color:"rgba(255,255,255,0.55)",whiteSpace:"nowrap"}}>{m2t(a.startMin)} · {a.channel} · {a.ds??"-"}/100</div></div>);})}
                </div>

            {unasgd.filter(Boolean).map(a=>{const c=sc(a);return(<div key={a.id} style={{background:"#2d1515",border:"1px solid #5a2020",borderRadius:6,padding:"8px 12px",marginBottom:8,cursor:"pointer"}} onClick={()=>setSel(sel===a.id?null:a.id)}><div style={{fontSize:11,fontWeight:600,color:c.tx,marginBottom:2}}>{a.name}</div><div style={{fontSize:10,color:C.MT,marginBottom:3}}>{m2t(a.startMin)}–{m2t(a.endMin)} · {a.channel} · {a.ds??0}/100</div><div style={{fontSize:10,color:"#f87171"}}>{a.why}</div>{a.bumpTgt&&<button style={{background:"#7c2d12",border:"1px solid #c2410c",borderRadius:4,color:"#fca5a5",fontSize:10,padding:"4px 10px",cursor:"pointer",marginTop:6}} onClick={e=>{e.stopPropagation();bumpAndAssign(a);}}>⚡ Bump "{a.bumpTgt.name}"</button>}</div>);})}
          </div>)}

      {tab==="list"&&(
        <div style={{paddingBottom:120}}>
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr 85px 50px 36px",gap:5,padding:"5px 14px",borderBottom:`1px solid ${C.BD}`}}>

          {[...ewp].sort((a,b)=>(b.ds??0)-(a.ds??0)).map((e,i,arr)=>{

            return(
              <div key={e.id} style={{display:"grid",gridTemplateColumns:"26px 30px 1fr 48px 36px 44px",gap:6,padding:"6px 14px",borderBottom:"1px solid #191c23",background:sel===e.id?`${c.bg}44`:i%2===0?`${c.bg}18`:`${c.bg}0e`,cursor:"pointer",alignItems:"center"}} onClick={()=>setSel(sel===e.id?null:e.id)}>

            <div>
              <div style={{fontWeight:700,fontSize:13,color:"#fff",marginBottom:2}}>{selEv.isFave?"⭐ ":""}{selEv.name}</div>
              <div style={{fontSize:10,color:C.MT}}>{selEv.league} · {selEv.channel} · {m2t(selEv.startMin)}–{m2t(selEv.endMin)} · {selEv.ds??0}/100{selEv.isFave&&<span style={{color:"#fbbf24",marginLeft:6}}>⭐ Fave +{FAVE_BOOST}</span>}{selEv.tv!==-1&&<span style={{color:C.MT,marginLeft:6}}>· {TVS[selEv.tv]?.name} ({TVS[selEv.tv]?.sz}")</span>}</div>
            </div>
            <button onClick={()=>setSel(null)} style={{background:"none",border:`1px solid ${C.BD}`,borderRadius:4,color:C.MT,fontSize:11,padding:"3px 8px",cursor:"pointer"}}>✕</button>
          </div>
          {selEv.tv===-1&&selEv.why&&(<div style={{background:"#2d1515",border:"1px solid #5a2020",borderRadius:6,padding:"8px 10px",marginBottom:10,fontSize:10,color:"#fca5a5",lineHeight:1.5}}>
            <div style={{fontFamily:"monospace",fontSize:9,color:C.A,marginBottom:3}}>WHY UNASSIGNED</div>
            {selEv.why}
            {selEv.bumpTgt&&<button style={{background:"#7c2d12",border:"1px solid #c2410c",borderRadius:4,color:"#fca5a5",fontSize:10,padding:"4px 10px",cursor:"pointer",marginTop:6,display:"block"}} onClick={()=>bumpAndAssign(selEv)}>⚡ Bump "{selEv.bumpTgt.name}"</button>}
          </div>)}
          <div style={{fontFamily:"monospace",fontSize:10,color:C.MT,marginBottom:5}}>{selEv.tv===-1?"ASSIGN TO:":"MOVE TO:"}</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
            {TV_PRIO.filter(id=>activeTVs.has(id)).map(tvId=>{
              const tv=TVS[tvId];const tvLabel=tvNames[tvId]||tv.name;
              const conflict=selEv.tv!==tvId&&final.some(a=>a&&a.tv===tvId&&a.id!==selEv.id&&overlaps(a,selEv));
              return(<button key={tvId} style={{padding:"3px 8px",borderRadius:4,fontFamily:"monospace",fontSize:9,fontWeight:700,cursor:conflict?"not-allowed":"pointer",background:selEv.tv===tvId?C.A:"#2e3545",color:selEv.tv===tvId?"#fff":C.MT,border:`1px solid ${selEv.tv===tvId?C.A:C.BD2}`,opacity:conflict?0.3:1}} onClick={()=>{if(!conflict){const e=final.find(a=>a.id===selEv.id);if(e){setPrioOvr(p=>({...p,[selEv.id]:e.priority}));}}}} title={conflict?`Conflict`:tv.loc}>{tv.name}{selEv.tv===tvId?" ✓":""}{conflict?" ✗":""}</button>);
            })}
          </div>
          {selEv.tv!==-1&&(<>
            <div style={{fontFamily:"monospace",fontSize:10,color:C.MT,marginBottom:5}}>📡 MIRROR TO: <span style={{color:C.DM}}>(displaces & reschedules)</span></div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {TV_PRIO.filter(id=>activeTVs.has(id)).map(tvId=>{
                if(tvId===selEv.tv)return null;
                const tv=TVS[tvId];const tvLabel=tvNames[tvId]||tv.name;const mir=mirrors[selEv.id]?.has(tvId);
                const disp=final.find(a=>a&&a.tv===tvId&&a.id!==selEv.id&&overlaps(a,selEv));
                return(<button key={tvId} style={{padding:"3px 8px",borderRadius:4,fontFamily:"monospace",fontSize:9,fontWeight:700,cursor:"pointer",background:mir?"#164e63":disp?"#2d1a0a":"#1f2937",color:mir?"#a5f3fc":disp?"#fb923c":C.MT,border:`1px solid ${mir?"#22d3ee":disp?"#c2410c":C.BD2}`}} onClick={()=>toggleMirror(selEv.id,tvId)}>{mir?"📡 ":disp?"⚡ ":""}{tv.name}{mir?" ✓":""}</button>);
              })}
            </div>
            {mirrors[selEv.id]?.size>0&&<div style={{fontFamily:"monospace",fontSize:10,color:"#22d3ee",marginTop:6}}>📡 Mirroring to {[...mirrors[selEv.id]].map(id=>TVS[id]?.name).join(", ")}</div>}
          </>)}
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
